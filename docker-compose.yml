version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: skykart_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: skykart_db
      POSTGRES_USER: skykart_user
      POSTGRES_PASSWORD: skykart_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skykart_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://skykart_user:skykart_pass@db:5432/skykart_db
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      APP_ENV: development
      DEBUG: "True"
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skykart_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
